# 使用已有 MySQL 容器，不在 compose 内新建 db。
# 在 .env 中配置 MYSQL_HOST：
#   - MySQL 已映射本机 3306 → host.docker.internal（Windows Docker Desktop 默认）
#   - 与 backend 同 Docker 网络 → 填 MySQL 容器名，如 mysql

services:
  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-local-env}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hota_mds}
      MYSQL_USER: ${MYSQL_USER:-hota_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hota_password}
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      SKIP_MIGRATE: ${SKIP_MIGRATE:-0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

  collector:
    build:
      context: ./collector
    environment:
      COLLECTOR_INTERVAL_SECONDS: ${COLLECTOR_INTERVAL_SECONDS:-60}
    restart: unless-stopped
