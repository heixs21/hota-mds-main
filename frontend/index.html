<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 电视 WebView 常把 device-width 报成 960px，导致大屏布局挤在左侧；按物理宽度强制 viewport -->
    <script>
      (function () {
        var w = Math.max(window.screen.width || 0, window.screen.height || 0, 1920);
        var meta = document.querySelector('meta[name="viewport"]');
        if (meta) {
          meta.setAttribute(
            "content",
            "width=" + w + ", initial-scale=1.0, maximum-scale=1.0, user-scalable=no",
          );
        }
      })();
    </script>
    <meta
      name="description"
      content="和泰智造数屏系统前端，包含后台管理与大屏展示入口。"
    />
    <meta name="theme-color" content="#08090a" />
    <title>和泰智造数屏系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>请启用 JavaScript 后再访问和泰智造数屏系统。</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
